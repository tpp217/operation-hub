<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERATION HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ トークン定義 ============ */
:root {
  --bg: #FAFBFC;
  --surface: #FFFFFF;
  --surface-2: #F4F6F8;
  --surface-3: #EEF1F4;
  --border: #E4E8EC;
  --border-strong: #D0D6DC;
  --text: #1A1F24;
  --text-2: #5B6672;
  --text-3: #8C96A1;
  --text-mute: #B0B8C1;

  --blue: #2563EB;
  --blue-2: #1D4ED8;
  --blue-soft: #EFF4FE;
  --blue-border: #C9DAF8;

  --green: #10A86B;
  --green-soft: #E6F7EF;
  --amber: #D97706;
  --amber-soft: #FEF3E2;
  --red: #DC2626;
  --red-soft: #FDECEC;
  --purple: #7C3AED;
  --purple-soft: #F3EDFE;

  --font-sans: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont,
               "Hiragino Kaku Gothic ProN", "Yu Gothic Medium", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;

  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 8px;

  --sidebar-w: 224px;
  --topbar-h: 48px;
}

/* ============ リセット ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--blue); text-decoration: none; }
a:hover { color: var(--blue-2); }

.num {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

/* ============ アプリシェル ============ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main";
  height: 100vh;
  min-height: 100vh;
}

/* ============ トップバー ============ */
.topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand__mark {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-sm);
  background: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0;
}
.brand__name {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand__sub {
  font-size: 11px;
  color: var(--text-3);
  padding-left: 10px;
  margin-left: 10px;
  border-left: 1px solid var(--border);
}
.topbar__right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-2);
}
#clock { font-weight: 500; }
#date-disp { color: var(--text-3); }

/* ============ サイドバー ============ */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar__section {
  padding: 16px 12px 8px;
}
.sidebar__label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  padding: 0 8px 8px;
}
.nav-list { display: flex; flex-direction: column; gap: 1px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text);
  font-size: 13px;
  border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s;
  text-align: left;
  width: 100%;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active {
  background: var(--blue-soft);
  border-color: var(--blue-border);
  color: var(--blue-2);
}
.nav-item__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-mute);
  flex-shrink: 0;
}
.nav-item.active .nav-item__dot { background: var(--blue); }
.nav-item__body { flex: 1; min-width: 0; }
.nav-item__name {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-item__sub {
  font-size: 11px;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.nav-item.active .nav-item__sub { color: var(--blue-2); opacity: 0.7; }
.nav-item--disabled { cursor: not-allowed; opacity: 0.55; }
.nav-item--disabled:hover { background: transparent; }

.sidebar__footer {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-3);
}

/* ============ メインエリア ============ */
.main {
  grid-area: main;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--bg);
}

/* --- ウェルカム画面 --- */
.welcome {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}
.page-head { margin-bottom: 24px; }
.page-head__title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.25;
  margin-bottom: 4px;
}
.page-head__sub {
  font-size: 12.5px;
  color: var(--text-2);
}

.grid-systems {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  max-width: 1200px;
}

.sys-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.12s;
  text-align: left;
}
.sys-card:hover { border-color: var(--border-strong); }
.sys-card--disabled { opacity: 0.6; }
.sys-card__head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sys-card__icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: var(--blue-soft);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sys-card__icon svg { width: 18px; height: 18px; }
.sys-card__title {
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.sys-card__sub {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 1px;
}
.sys-card__desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.55;
  flex: 1;
}
.sys-card__foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-top: 4px;
}
.sys-card__url {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* --- iframe ビュー --- */
.iframe-view {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 0;
}
.iframe-view.is-active { display: flex; }

.iframe-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.iframe-toolbar__crumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-2);
  flex: 1;
  min-width: 0;
}
.iframe-toolbar__crumb strong {
  color: var(--text);
  font-weight: 600;
  font-size: 13px;
}
.iframe-toolbar__crumb .sep { color: var(--text-mute); }
.iframe-toolbar__actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.iframe-wrap {
  flex: 1;
  position: relative;
  background: var(--surface);
  min-height: 0;
}
.iframe-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.iframe-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  color: var(--text-3);
  font-size: 12.5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.iframe-loading.is-visible { opacity: 1; }

.iframe-fallback {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  text-align: center;
  background: var(--surface);
}
.iframe-fallback.is-visible { display: flex; }
.iframe-fallback__icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  background: var(--amber-soft);
  color: var(--amber);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.iframe-fallback__icon svg { width: 24px; height: 24px; }
.iframe-fallback__title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}
.iframe-fallback__desc {
  font-size: 12.5px;
  color: var(--text-2);
  max-width: 420px;
  margin-bottom: 16px;
  line-height: 1.6;
}
.iframe-fallback__code {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-2);
  margin-bottom: 20px;
  display: inline-block;
}

/* ============ ボタン ============ */
.btn {
  height: 28px;
  padding: 0 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.1s, border-color 0.1s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn svg { width: 13px; height: 13px; }

.btn--primary {
  background: var(--blue);
  border-color: var(--blue);
  color: white;
}
.btn--primary:hover { background: var(--blue-2); border-color: var(--blue-2); }

.btn--ghost {
  border-color: transparent;
  background: transparent;
  color: var(--text-2);
}
.btn--ghost:hover { background: var(--surface-2); color: var(--text); }

.btn--sm { height: 24px; padding: 0 8px; font-size: 11.5px; }
.btn--icon { padding: 0; width: 28px; justify-content: center; }
.btn--icon.btn--sm { width: 24px; }

/* スクロールバー */
.sidebar::-webkit-scrollbar,
.welcome::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb,
.welcome::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}
.sidebar::-webkit-scrollbar-thumb:hover,
.welcome::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* レスポンシブ */
@media (max-width: 820px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-areas:
      "topbar"
      "main";
  }
  .sidebar { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- トップバー -->
  <header class="topbar">
    <div class="brand">
      <div class="brand__mark">OH</div>
      <div class="brand__name">OPERATION HUB</div>
      <div class="brand__sub">システム統合ポータル</div>
    </div>
    <div class="topbar__right">
      <div id="clock" class="num">--:--</div>
      <div id="date-disp">----/--/--</div>
    </div>
  </header>

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">システム</div>
      <nav class="nav-list" id="nav-list"></nav>
    </div>
    <div class="sidebar__footer">
      v2.2.0 · © 2026
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="main">

    <!-- ウェルカム画面 -->
    <div id="welcome" class="welcome">
      <div class="page-head">
        <h1 class="page-head__title">ようこそ</h1>
        <p class="page-head__sub">利用するシステムを左のメニューまたは下のカードから選択してください。</p>
      </div>
      <div class="grid-systems" id="system-grid"></div>
    </div>

    <!-- iframe ビュー -->
    <div id="iframe-view" class="iframe-view">
      <div class="iframe-toolbar">
        <div class="iframe-toolbar__crumb">
          <span>システム</span>
          <span class="sep">/</span>
          <strong id="iframe-title">-</strong>
        </div>
        <div class="iframe-toolbar__actions">
          <a id="open-external" class="btn btn--sm" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 3h4v4M13 3l-6 6M11 9v3.5A1.5 1.5 0 0 1 9.5 14h-6A1.5 1.5 0 0 1 2 12.5v-6A1.5 1.5 0 0 1 3.5 5H7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            新しいタブで開く
          </a>
          <button id="close-iframe" class="btn btn--sm btn--ghost btn--icon" title="閉じる" aria-label="閉じる">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 4l8 8M12 4l-8 8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="iframe-wrap">
        <div id="iframe-loading" class="iframe-loading">読み込み中…</div>
        <iframe id="system-iframe" title="system"></iframe>
        <div id="iframe-fallback" class="iframe-fallback">
          <div class="iframe-fallback__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 9v4M12 17h.01" stroke-linecap="round"/>
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="iframe-fallback__title">このシステムは埋め込み表示できません</div>
          <div class="iframe-fallback__desc">
            システム側でフレーム埋め込みが許可されていないため、このビュー内に表示できません。<br>
            新しいタブで開いて利用してください。
          </div>
          <div class="iframe-fallback__code" id="fallback-url">-</div>
          <a id="fallback-open" class="btn btn--primary" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 3h4v4M13 3l-6 6M11 9v3.5A1.5 1.5 0 0 1 9.5 14h-6A1.5 1.5 0 0 1 2 12.5v-6A1.5 1.5 0 0 1 3.5 5H7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            新しいタブで開く
          </a>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
// ============ システム定義 ============
const SYSTEMS = [
  {
    id: 'closing',
    name: 'CLOSING AUTO',
    sub: '締め作業自動化',
    desc: '月次・日次の締め作業を自動化し、経理処理の工数を削減します。',
    url: 'https://closing.utinc.dev',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="4" width="18" height="16" rx="2"/>
      <path d="M3 10h18M8 4v4M16 4v4" stroke-linecap="round"/>
      <path d="M8 14l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  {
    id: 'media',
    name: 'MEDIA-MGR',
    sub: '媒体管理システム',
    desc: '広告媒体・掲載先の情報を一元管理し、出稿状況を可視化します。',
    url: 'https://media.utinc.dev',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <path d="M3 9h18M7 5v14M13 9v10" stroke-linecap="round"/>
    </svg>`
  },
  {
    id: 'nexus',
    name: 'NEXUS OPS',
    sub: '店舗・スタッフ分析',
    desc: '店舗ごとの業績とスタッフのパフォーマンスを分析します。',
    url: 'https://nexus.utinc.dev',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 17l6-6 4 4 7-8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="9" cy="11" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="13" cy="15" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="20" cy="7" r="1.5" fill="currentColor" stroke="none"/>
    </svg>`
  },
  {
    id: 'lpd',
    name: 'LINE PDF',
    sub: 'PDF配信システム',
    desc: 'LINE経由でPDFを配信。送信履歴や既読状況を確認できます。',
    url: 'https://lpd.utinc.dev',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z" stroke-linejoin="round"/>
      <path d="M14 3v5h5M9 13h6M9 17h4" stroke-linecap="round"/>
    </svg>`
  }
];

// ============ 時計 ============
function updateClock() {
  const n = new Date();
  const pad = v => String(v).padStart(2, '0');
  const hh = pad(n.getHours()), mm = pad(n.getMinutes());
  const y = n.getFullYear(), mo = pad(n.getMonth() + 1), dd = pad(n.getDate());
  document.getElementById('clock').textContent = `${hh}:${mm}`;
  document.getElementById('date-disp').textContent = `${y}/${mo}/${dd}`;
}
setInterval(updateClock, 30000);
updateClock();

// ============ サイドバー描画 ============
const navList = document.getElementById('nav-list');
SYSTEMS.forEach(sys => {
  const btn = document.createElement('button');
  btn.className = 'nav-item';
  btn.dataset.sysId = sys.id;
  btn.innerHTML = `
    <span class="nav-item__dot"></span>
    <span class="nav-item__body">
      <span class="nav-item__name">${sys.name}</span>
      <span class="nav-item__sub">${sys.sub}</span>
    </span>
  `;
  btn.addEventListener('click', () => openSystem(sys.id));
  navList.appendChild(btn);
});

// ============ ウェルカム画面カード描画 ============
const grid = document.getElementById('system-grid');
SYSTEMS.forEach(sys => {
  const card = document.createElement('button');
  card.className = 'sys-card';
  card.innerHTML = `
    <div class="sys-card__head">
      <div class="sys-card__icon">${sys.icon}</div>
      <div>
        <div class="sys-card__title">${sys.name}</div>
        <div class="sys-card__sub">${sys.sub}</div>
      </div>
    </div>
    <div class="sys-card__desc">${sys.desc}</div>
    <div class="sys-card__foot">
      <span class="sys-card__url">${new URL(sys.url).host}</span>
      <span class="btn btn--sm btn--primary" style="pointer-events:none;">開く</span>
    </div>
  `;
  card.addEventListener('click', () => openSystem(sys.id));
  grid.appendChild(card);
});

// ============ iframe 表示制御 ============
const welcome = document.getElementById('welcome');
const iframeView = document.getElementById('iframe-view');
const iframe = document.getElementById('system-iframe');
const iframeTitle = document.getElementById('iframe-title');
const openExternal = document.getElementById('open-external');
const fallback = document.getElementById('iframe-fallback');
const fallbackUrl = document.getElementById('fallback-url');
const fallbackOpen = document.getElementById('fallback-open');
const loading = document.getElementById('iframe-loading');

let currentSysId = null;
let loadTimer = null;

function openSystem(sysId) {
  const sys = SYSTEMS.find(s => s.id === sysId);
  if (!sys) return;

  currentSysId = sysId;

  // サイドバーの active 状態を更新
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sysId === sysId);
  });

  // ツールバー更新
  iframeTitle.textContent = sys.name;
  openExternal.href = sys.url;
  fallbackUrl.textContent = sys.url;
  fallbackOpen.href = sys.url;

  // ビュー切替
  welcome.style.display = 'none';
  iframeView.classList.add('is-active');

  // iframe 読み込み
  fallback.classList.remove('is-visible');
  loading.classList.add('is-visible');
  iframe.style.visibility = 'hidden';
  iframe.src = sys.url;

  // CSP/X-Frame-Options でブロックされた場合の検出
  // onload は発火するが about:blank のままで中身が空、または never fires のケースあり
  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => {
    // 一定時間で load イベントが起きていなければフォールバック表示
    if (loading.classList.contains('is-visible')) {
      showFallback();
    }
  }, 6000);
}

iframe.addEventListener('load', () => {
  loading.classList.remove('is-visible');
  iframe.style.visibility = 'visible';
  clearTimeout(loadTimer);

  // iframe の contentDocument にアクセスできない = CSP ブロックの可能性
  // ただしクロスオリジンでは正常ロードでも同じエラーになるため、url 判定は difficult
  // load 発火 = 基本的には成功とみなす。CSP frame-ancestors で拒否された場合、
  // ブラウザは空のページをロードするが load は発火する。その場合ユーザー側で
  // "新しいタブで開く" を押すことになる。
});

iframe.addEventListener('error', () => {
  showFallback();
});

function showFallback() {
  loading.classList.remove('is-visible');
  fallback.classList.add('is-visible');
}

function closeSystem() {
  currentSysId = null;
  iframe.src = 'about:blank';
  iframeView.classList.remove('is-active');
  welcome.style.display = 'block';
  fallback.classList.remove('is-visible');
  loading.classList.remove('is-visible');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  clearTimeout(loadTimer);
}

document.getElementById('close-iframe').addEventListener('click', closeSystem);

// Esc で閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && currentSysId) closeSystem();
});
</script>
</body>
</html>
